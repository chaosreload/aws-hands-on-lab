site_name: AWS Hands-on Lab
site_url: https://chaosreload.github.io/aws-hands-on-lab/
site_description: AWS 动手实验室 — 从概念到实操的技术指南
site_author: chaosreload
repo_url: https://github.com/chaosreload/aws-hands-on-lab
repo_name: chaosreload/aws-hands-on-lab

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - social
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - AI/ML:
    - ai-ml/index.md
    - Amazon Nova Multimodal Embeddings 实测：首个统一多模态 Embedding 模型: ai-ml/nova-multimodal-embeddings.md
    - Amazon Bedrock AgentCore Policy 实战：用 Cedar 策略语言精准控制 Agent 工具调用: ai-ml/bedrock-agentcore-policy-ga.md
    - AgentCore Runtime Shell Command 实测: ai-ml/agentcore-runtime-shell-command.md
    - AgentCore WebRTC 双向流：KVS TURN 实时语音 Agent 实战: ai-ml/agentcore-webrtc-streaming.md
    - Bedrock TTFT + Quota 可观测性实测: ai-ml/bedrock-ttft-quota-observability.md
    - Bedrock MiniMax M2.5 vs GLM 5 实测: ai-ml/bedrock-minimax-glm5-benchmark.md
    - 在 EC2 嵌套虚拟化上部署 Zeroboot：亚毫秒级 VM Sandbox Benchmark 实测: ai-ml/zeroboot-ec2-benchmark.md
    - Zeroboot vs E2B 深度对比：AI Agent Sandbox 技术路线分析: ai-ml/zeroboot-vs-e2b.md
    - Neuron DRA Driver：EKS 上 Trainium 拓扑感知调度实战: ai-ml/neuron-eks-dra-driver.md
    - 实测 Amazon Bedrock Agents CloudWatch 指标：多模型对比 + 13 个运行时指标全解析: ai-ml/bedrock-agents-cloudwatch-metrics.md
    - Amazon Nova Act 实测：用自然语言驱动浏览器自动化的 AI Agent 服务: ai-ml/nova-act-browser-automation.md
    - 实测 AWS MCP Server：用 AI 助手一键部署 ECS 和 Lambda 应用: ai-ml/mcp-serverless-containers.md
    - Amazon Nova Pro Latency-Optimized Inference 实测：一个参数降低 33% 推理延迟: ai-ml/nova-pro-latency-optimized.md
    - Amazon Nova Sonic 实测：Bedrock 双向流式语音对话 Hands-on Lab: ai-ml/nova-sonic-speech-to-speech.md
  - Compute:
    - compute/index.md
    - Lambda MI + Rust 性能对比: compute/lambda-managed-instances-rust.md
    - Lambda AZ Metadata 同 AZ 路由实测: compute/lambda-az-metadata.md
    - EC2 嵌套虚拟化实测：在虚拟实例上运行 KVM 和 Firecracker: compute/ec2-nested-virtualization.md
  - Networking:
    - networking/index.md
  - Storage:
    - storage/index.md
    - S3 Tables IAM-only 权限实测: storage/s3-tables-iam-permissions.md
    - AWS DataSync 集成 Secrets Manager：三种凭证管理模式实测对比: storage/datasync-secrets-manager.md
    - Amazon S3 Vectors (Preview) 实战：云原生向量存储初体验: storage/s3-vectors-preview.md
  - Database:
    - database/index.md
    - OpenSearch 原地扩容实测: database/opensearch-in-place-volume.md
    - AWS DMS Serverless 自动存储扩展实测：告别 100GB 限制: database/dms-serverless-storage-scaling.md
  - Security:
    - security/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chaosreload
